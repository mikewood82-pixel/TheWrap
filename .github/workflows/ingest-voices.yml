name: Ingest HR Tech voices

on:
  schedule:
    # Three times daily (UTC): 04:23, 12:23, 20:23. Off-peak minute avoids
    # cron-spike throttling on upstream feed hosts.
    - cron: '23 4,12,20 * * *'
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Site URL (default: production)'
        required: false
        default: 'https://ilovethewrap.com'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install minimal deps
        run: npm ci --no-audit --no-fund

      - name: Run voices ingest
        env:
          SITE_URL: ${{ github.event.inputs.site_url || 'https://ilovethewrap.com' }}
          VOICES_INGEST_TOKEN: ${{ secrets.VOICES_INGEST_TOKEN }}
        run: node scripts/voices-ingest.mjs
