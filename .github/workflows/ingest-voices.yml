name: Refresh HR Tech voices

on:
  schedule:
    # Three times daily (UTC): 04:23, 12:23, 20:23. Off-peak minute avoids
    # cron-spike throttling on upstream feed hosts.
    - cron: '23 4,12,20 * * *'
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Site URL (default: production)'
        required: false
        default: 'https://ilovethewrap.com'

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/voices/refresh
        env:
          SITE_URL: ${{ github.event.inputs.site_url || 'https://ilovethewrap.com' }}
          VOICES_INGEST_TOKEN: ${{ secrets.VOICES_INGEST_TOKEN }}
        run: |
          if [ -z "$VOICES_INGEST_TOKEN" ]; then
            echo "::error::VOICES_INGEST_TOKEN secret not set"; exit 1
          fi
          echo "POSTing ${SITE_URL}/api/voices/refresh"
          HTTP_CODE=$(curl -s -o /tmp/refresh.out -w "%{http_code}" \
            --max-time 120 \
            -X POST "${SITE_URL}/api/voices/refresh" \
            -H "Authorization: Bearer ${VOICES_INGEST_TOKEN}")
          echo "Response ($HTTP_CODE):"
          cat /tmp/refresh.out || true
          echo
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::refresh returned ${HTTP_CODE}"; exit 1
          fi
