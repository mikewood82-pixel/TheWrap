name: Ingest BLS / FRED for WUI

on:
  schedule:
    # 7th of each month at 14:30 UTC. BLS Employment Situation (U-3, U-6)
    # publishes the first Friday; JOLTS (quits rate) for month M-2 is usually
    # released in the first week of M, so by the 7th the latest WUI-eligible
    # month should be complete.
    - cron: '30 14 7 * *'
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Site URL (default: production)'
        required: false
        default: 'https://ilovethewrap.com'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run BLS ingest
        env:
          SITE_URL: ${{ github.event.inputs.site_url || 'https://ilovethewrap.com' }}
          BLS_INGEST_TOKEN: ${{ secrets.BLS_INGEST_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/ingest-bls.mjs
