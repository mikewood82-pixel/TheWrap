name: Ingest HR Tech jobs

on:
  schedule:
    # Daily at 06:00 UTC (≈ 2am ET). Avoids the minute-0 spike.
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Site URL (default: production)'
        required: false
        default: 'https://ilovethewrap.com'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install minimal deps
        # We only need tsx + the packages the connectors rely on (stdlib only).
        run: npm ci --no-audit --no-fund

      - name: Run ingest
        env:
          SITE_URL: ${{ github.event.inputs.site_url || 'https://ilovethewrap.com' }}
          JOBS_INGEST_TOKEN: ${{ secrets.JOBS_INGEST_TOKEN }}
        run: npx tsx scripts/ingest-run.mjs

      - name: Deliver Wrap+ alert digests
        # Runs after ingest so digests can include the morning's new jobs.
        # Soft-failure: missing token / non-2xx response logs but doesn't fail
        # the job — ingest itself has already succeeded at this point.
        env:
          SITE_URL: ${{ github.event.inputs.site_url || 'https://ilovethewrap.com' }}
          ALERT_DELIVERY_TOKEN: ${{ secrets.ALERT_DELIVERY_TOKEN }}
        run: |
          if [ -z "$ALERT_DELIVERY_TOKEN" ]; then
            echo "ALERT_DELIVERY_TOKEN not set — skipping alert delivery."
            exit 0
          fi
          echo "Posting to ${SITE_URL}/api/jobs/alerts/deliver"
          HTTP_CODE=$(curl -s -o /tmp/deliver.out -w "%{http_code}" \
            -X POST "${SITE_URL}/api/jobs/alerts/deliver" \
            -H "Authorization: Bearer ${ALERT_DELIVERY_TOKEN}")
          echo "Response ($HTTP_CODE):"
          cat /tmp/deliver.out || true
          echo
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::warning::Alert delivery returned ${HTTP_CODE} — investigate, but not failing the job."
          fi

      - name: Deliver Wrap+ vendor health alerts
        # Detect verdict changes vs. yesterday and email watchers. Depends on
        # fresh vendor_snapshots from the ingest step above. Soft-failure
        # (warning, not failure) for the same reason as the jobs digest.
        env:
          SITE_URL: ${{ github.event.inputs.site_url || 'https://ilovethewrap.com' }}
          VENDOR_ALERT_TOKEN: ${{ secrets.VENDOR_ALERT_TOKEN }}
        run: |
          if [ -z "$VENDOR_ALERT_TOKEN" ]; then
            echo "VENDOR_ALERT_TOKEN not set — skipping vendor-alert delivery."
            exit 0
          fi
          echo "Posting to ${SITE_URL}/api/vendor-alerts/deliver"
          HTTP_CODE=$(curl -s -o /tmp/vendor-alert.out -w "%{http_code}" \
            --max-time 120 \
            -X POST "${SITE_URL}/api/vendor-alerts/deliver" \
            -H "Authorization: Bearer ${VENDOR_ALERT_TOKEN}")
          echo "Response ($HTTP_CODE):"
          cat /tmp/vendor-alert.out || true
          echo
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::warning::Vendor-alert delivery returned ${HTTP_CODE} — investigate, but not failing the job."
          fi
